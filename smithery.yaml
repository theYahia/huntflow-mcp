startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - HUNTFLOW_TOKEN
    properties:
      HUNTFLOW_TOKEN:
        type: string
        title: HuntFlow API Token
        description: "API токен из настроек HuntFlow (Настройки → API)"
  commandFunction:
    |-
    (config) => ({
      command: "node",
      args: ["dist/index.js"],
      env: {
        HUNTFLOW_TOKEN: config.HUNTFLOW_TOKEN
      }
    })
